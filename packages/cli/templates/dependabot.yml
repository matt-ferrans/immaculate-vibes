# Dependabot — keep dependencies (incl. @iv/*) patched.
#
# Groups patch + minor bumps per ecosystem so the PR volume stays sane;
# majors stay separate so a breaking bump gets its own review.

version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      patch-and-minor:
        update-types: [patch, minor]
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(deps-dev)

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    commit-message:
      prefix: chore(ci)
